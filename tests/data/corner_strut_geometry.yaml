type: double_wishbone
name: "corner strut (outboard)"
version: "0.0.1"
units: MILLIMETERS

# Single left corner with an OUTBOARD spring/damper (coilover) mounted on the
# lower wishbone. Derived from tests/data/geometry.yaml (camber shim omitted for
# a clean strut study, no pushrod/rocker group). STRUT_TOP is chassis-fixed;
# STRUT_BOTTOM sits on the lower-wishbone body near the outboard end, lifted a
# little off the wishbone plane (z = 200) so its three rigid distances to the
# wishbone pickups pin a well-defined (non-coplanar) handedness.
hardpoints:
  # Lower Wishbone.
  lower_wishbone_inboard_front: {x: 250, y: 400, z: 200}
  lower_wishbone_inboard_rear: {x: -250, y: 450, z: 200}
  lower_wishbone_outboard: {x: 0, y: 900, z: 200}

  # Upper Wishbone.
  upper_wishbone_inboard_front: {x: 225, y: 350, z: 500}
  upper_wishbone_inboard_rear: {x: -275, y: 350, z: 500}
  upper_wishbone_outboard: {x: -25, y: 750, z: 500}

  # Track Rod.
  trackrod_inboard: {x: 50, y: 200, z: 250}
  trackrod_outboard: {x: 150, y: 800, z: 275}

  # Axle.
  axle_inboard: {x: -20, y: 800, z: 308.426}
  axle_outboard: {x: -20, y: 950, z: 313.426}

  # Spring/damper (coilover), outboard on the lower wishbone. STRUT_BOTTOM is
  # near the outboard end and 40 mm above the wishbone plane; STRUT_TOP is a
  # chassis-fixed upper mount roughly above it.
  strut_bottom: {x: 0, y: 780, z: 240}
  strut_top: {x: 0, y: 600, z: 650}

# Configuration.
config:
  steered: true
  wheel:
    offset: 0
    tire:
      aspect_ratio: 0.55
      section_width: 270
      rim_diameter: 13
  cg_position: {x: 1250, y: 0, z: 450}
  wheelbase: 2500.0
