type: double_wishbone_axle
name: "composed T-bar axle"
version: "0.0.1"
units: millimeters

corner:
  actuation:
    type: pushrod_rocker
  spring:
    type: torsion_bar
anti_roll:
  type: t_bar
heave_link:
  type: none

hardpoints:
  side: left
  points:
    lower_wishbone_inboard_front: {x: 250, y: 400, z: 200}
    lower_wishbone_inboard_rear: {x: -250, y: 450, z: 200}
    lower_wishbone_outboard: {x: 0, y: 900, z: 200}
    upper_wishbone_inboard_front: {x: 225, y: 350, z: 500}
    upper_wishbone_inboard_rear: {x: -275, y: 350, z: 500}
    upper_wishbone_outboard: {x: -25, y: 750, z: 500}
    trackrod_inboard: {x: 50, y: 200, z: 250}
    trackrod_outboard: {x: 150, y: 800, z: 275}
    axle_inboard: {x: -20, y: 800, z: 308.426}
    axle_outboard: {x: -20, y: 950, z: 313.426}

    # The oblique rocker axis has constant X and changes in both Y and Z.
    pushrod_outboard: {x: 0, y: 870, z: 240}
    pushrod_inboard: {x: 100, y: 430, z: 480}
    rocker_axis_a: {x: 0, y: 250, z: 400}
    rocker_axis_b: {x: 0, y: 300, z: 500}

    # The rocker and T-bar pickups are joined by a fixed-length droplink.
    droplink_rocker: {x: 60, y: 250, z: 450}
    droplink_t_bar: {x: 20, y: 220, z: 430}

  center:
    # The T-bar bottom point is fixed to the chassis centerline.
    arb_t_bar_pivot: {x: 0, y: 0, z: 250}

config:
  steered: true
  wheel:
    offset: 0
    tire:
      aspect_ratio: 0.55
      section_width: 270
      rim_diameter: 13
  cg_position: {x: 1250, y: 0, z: 450}
  wheelbase: 2500.0
