version: 1
steps: 36
targets:
  # Pure bump sweep: only wheel-center Z is driven. The steering rack (trackrod
  # inboard) is deliberately left undriven; the solver holds it at its design
  # position automatically, so a 0-to-0 dummy target is no longer needed to keep
  # the corner unsteered.
  - point: WHEEL_CENTER
    direction:
      axis: Z
    mode: relative
    start: -60
    stop: 80
